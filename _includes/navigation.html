<nav class="header">
  <div class="top-bar">
    <div class="top-bar-left">
      <ul class="menu">
        <li class="menu-text">{{ site.title }}</li>
        <li class="menu-text">
          <span data-responsive-toggle="nav-menu" data-hide-for="medium">
            <button class="menu-icon dark" type="button" data-toggle></button>
          </span>
        </li>
      </ul>
      
    </div> <!-- /.top-bar-left -->
    <div class="top-bar-right" id="nav-menu">
        <ul class="menu">
          {% for item in site.data.navigation %}
            <li><a href="{{ item.link }}" {% if page.url == item.link %}class="current"{% endif %}>{{ item.name }}</a></li>
          {% endfor %}
        </ul>
    </div> <!-- /.top-bar-right -->
  </div> <!-- /.top-bar -->
</nav>
