---
layout: default
title: Blog
lang: id
ref: blog
---

<section class="hero is-medium">
  <div class="hero-body">
    <div class="container">
      <div>
        <h1 class="title">Post Terbaru</h1>
  
        <ul>
          {% for post in site.posts %}
            <li>
              <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
              <p>{{ post.excerpt }}</p>
            </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>

</section>
