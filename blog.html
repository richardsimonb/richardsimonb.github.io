---
layout: default
title: Blog
---

<div class="grid-x grid-padding-x">
    <div class="large-12 medium-12 cell">
      <h1>Latest Posts</h1>

      <ul>
        {% for post in site.posts %}
          <li>
            <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <p>{{ post.excerpt }}</p>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
